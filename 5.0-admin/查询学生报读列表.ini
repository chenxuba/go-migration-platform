字段注释（对应你贴的返回 data.list[] 每一项）
id：学费账户ID（tuition_account 记录ID）
lessonId：报读课程ID
lessonName：报读课程名称
lessonType：授课方式（通常：1=1v1，2=班级；以你们系统枚举为准）
totalQuantity：总购买数量（不含赠送，可能是课时/天数/金额数量，取决于计费方式）
totalFreeQuantity：总赠送数量（赠送课时/天数等）
totalTuition：该报读的总学费金额（购买部分对应的总金额）
arrearTuition：欠费金额（应收未收的金额）
isAdjustable：是否允许调整（例如调课时/调有效期/调金额等，具体由业务规则决定）
remainQuantity：剩余数量（购买剩余 + 赠送剩余 的总剩余）
tuition：剩余学费金额（remainingTuition）
remainFreeQuantity：剩余赠送数量（赠送部分当前还剩多少）
enableExpireTime：是否启用有效期（true=有有效期控制，false=无有效期）
expireTime：过期时间（到这个时间点后该账户视为过期/失效；0001-01-01T00:00:00 通常表示“未设置/无效值”）
activedAt：激活/生效时间（开始可用的时间点，很多场景用创建时间或启用时间）
assignedClass：是否已分配班级（true=已分班，false=未分班）
status：学费账户状态（通常：1=正常，2=停课，3=结课）
changeStatusTime：状态变更时间（变更为当前 status 的时间）
lessonChargingMode：计费方式（通常：1=按课时，2=按时段/天，3=按金额）
lessonScope：课程范围/课程类型（值域看你们课程字典，比如 1/4 代表不同课程分类）
planSuspendTime：计划停课时间（如果排了未来停课计划）
planResumeTime：计划复课时间（如果排了未来复课计划）
hasGradeUpgrade：是否有升班/升阶（true=有升班记录或标记，false=没有）
manualSort：是否手动排序（true=人为调整过显示顺序，false=未手动调整）




接口基本信息
接口名称：查询学生报读列表（学费账户在读列表）
请求方式：POST
请求路径：/TuitionAccount/GetTuitionAccountReadingList
鉴权：需要登录（使用当前登录人的机构 instId 做数据隔离）
请求参数
请求体（JSON）
{  "sortModel": {},  "queryModel": {    "studentId": "150"  },  "pageRequestModel": {    "needTotal": true,    "pageSize": 20,    "pageIndex": 1,    "skipCount": 0  }}
字段说明
sortModel object：排序模型（目前预留，暂未使用，可传空对象 {}）
queryModel object：查询条件
studentId string：
必填
学员 ID（与你系统中的学员 ID 一致，例如 150 或长 ID）
pageRequestModel object：分页参数
needTotal boolean：
是否需要返回总条数
pageSize number：
每页条数
pageIndex number：
页码（从 1 开始）
skipCount number：
跳过条数（前端统一传 0，后端使用 pageIndex / pageSize 做分页）
返回结果
返回体结构
{  "code": 200,  "message": "查询成功！",  "data": {    "list": [      {        "id": "689368857860687872",        "lessonId": "617134640326594560",        "lessonName": "感知觉",        "lessonType": 1,        "totalQuantity": 5,        "totalFreeQuantity": 0,        "totalTuition": 3000,        "arrearTuition": 0,        "isAdjustable": true,        "remainQuantity": 5,        "tuition": 3000,        "remainFreeQuantity": 0,        "enableExpireTime": false,        "expireTime": "0001-01-01T00:00:00",        "activedAt": "2026-01-19T00:19:43",        "assignedClass": false,        "status": 1,        "changeStatusTime": "2026-01-19T00:19:43",        "lessonChargingMode": 1,        "lessonScope": 4,        "planSuspendTime": "0001-01-01T00:00:00",        "planResumeTime": "0001-01-01T00:00:00",        "hasGradeUpgrade": false,        "manualSort": false      }    ],    "total": 1  }}
字段说明（data.list[] 每一项）
id string：学费账户 ID（对应 tuition_account 表主键 / ES 文档 ID）
lessonId string：报读课程 ID
lessonName string：报读课程名称
lessonType number：授课方式
1：1v1 授课
2：班级授课
（值来源于 inst_course.teach_method）
totalQuantity number：总购买数量（不含赠送）
totalFreeQuantity number：总赠送数量
totalTuition number：该报读的总学费金额（购买部分对应的总金额）
arrearTuition number：欠费金额（当前版本默认为 0，后续可根据应收减已收计算）
isAdjustable boolean：是否允许调整（当前默认 true，后续可根据配置控制）
remainQuantity number：剩余总数量（购买剩余 + 赠送剩余）
tuition number：剩余学费金额（对应 ES 的 remainingTuition）
remainFreeQuantity number：剩余赠送数量
enableExpireTime boolean：是否启用有效期（true=有有效期，false=无限期）
expireTime string：过期时间
格式：yyyy-MM-ddTHH:mm:ss
"0001-01-01T00:00:00" 表示未设置/无有效期
activedAt string：激活时间/生效时间（通常为创建时间）
格式：yyyy-MM-ddTHH:mm:ss
assignedClass boolean：是否已分配班级
status number：学费账户状态
1：正常
2：已停课
3：已结课
changeStatusTime string：状态变更时间
格式：yyyy-MM-ddTHH:mm:ss
lessonChargingMode number：收费方式
1：按课时
2：按时段（天）
3：按金额
lessonScope number：课程范围 / 课程类型（含义由课程配置决定，例如 1=主课，4=某类课程）
planSuspendTime string：计划停课时间
格式：yyyy-MM-ddTHH:mm:ss，0001-01-01T00:00:00 表示未设置
planResumeTime string：计划复课时间
格式同上
hasGradeUpgrade boolean：是否有升班记录/标记
manualSort boolean：是否手动排序（true=人为调整过顺序，false=默认顺序）
外层字段
code number：
200：成功
其他：失败（具体含义看全局错误码）
message string：提示信息（如 "查询成功！" / 错误原因）
data.total number：总条数（当 needTotal=true 时返回）
示例
请求示例
POST /TuitionAccount/GetTuitionAccountReadingListContent-Type: application/json{  "sortModel": {},  "queryModel": {    "studentId": "150"  },  "pageRequestModel": {    "needTotal": true,    "pageSize": 20,    "pageIndex": 1,    "skipCount": 0  }}
